<!DOCTYPE html>
<html lang="nl" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>Regio — Library of Identification Resources</title>

        <link rel="stylesheet" href="/assets/css/main.css?v=20260404">
        <link rel="shortcut icon" href="/assets/img/logo_124.png">

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <script data-goatcounter="https://loir.goatcounter.com/count" async src="//gc.zgo.at/count.v4.js" crossorigin="anonymous" integrity="sha384-nRw6qfbWyJha9LhsOtSb2YJDyZdKvvCFh0fJYlkquSFjUxp9FVNugbfy8q1jdxI+"></script>
    </head>
    <body>
        <header class="small">
            <a href="/nl/">
                <img id="logo" src="/assets/img/logo_512.png" alt="Logo: mot met gespreide gespikkelde zwart-met-rode vleugels">
            </a>

            <h1>Library of Identification Resources</h1>

            <nav>
                <ul>
                    <li><a href="/nl/catalog">Catalogus</a></li>
                    <li><a href="/nl/catalog/visualizations">Statistieken</a></li>
                    <li><a href="/nl/users/settings">Instellingen</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <article>
                <header>
                    <h2 id="mainTitle"></h2>
                </header>

                <section>
                    <div class="table">
                        <table>
                            <tbody>
                                <tr>
                                    <th>Permalink</th>
                                    <td id="permalink"></td>
                                </tr>
                                <tr>
                                    <th>Wikidata</th>
                                    <td id="wikidata"></td>
                                </tr>
                                <tr>
                                    <th>Scholia</th>
                                    <td id="scholia"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section>
                    <h3>Artikelen/boeken</h3>
                    <p id="search"></p>
                    <table>
                        <thead>
                            <tr>
                                <th>Jaar</th>
                                <th>Taxon</th>
                                <th>Titel</th>
                            </tr>
                        </thead>
                        <tbody id="parts">
                        </tbody>
                    </table>
                </section>
            </article>
        </main>

        <footer>
            <nav>
                <ul>
                    <li><a href="/nl/#header-contribute">Bijdragen</a></li>
                    <li><a href="/nl/#header-data">Data</a></li>
                    <li><a href="/nl/#header-contact">Contact</a></li>
                </ul>
            </nav>

            <div>
                <label for="footer-language">Taal</label>:
                <select id="footer-language">
                    <option value="en">Engels</option>
                    <option value="nl" selected>Nederlands</option>
                </select>
            </div>
        </footer>

        <script src="/assets/js/shared.js?v=20260404" charset="utf-8"></script>
        <script src="/assets/js/place.js?v=20260404" charset="utf-8"></script>
    </body>
</html>
