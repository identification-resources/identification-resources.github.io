<!DOCTYPE html>
<html lang="en" dir="ltr">
    <head>
        <meta charset="utf-8">
        <title>Inhoud — Library of Identification Resources</title>

        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="shortcut icon" href="/assets/img/logo_124.png">

        <meta name="viewport" content="width=device-width, initial-scale=1">

        <script data-goatcounter="https://loir.goatcounter.com/count" async src="//gc.zgo.at/count.v4.js" crossorigin="anonymous" integrity="sha384-nRw6qfbWyJha9LhsOtSb2YJDyZdKvvCFh0fJYlkquSFjUxp9FVNugbfy8q1jdxI+"></script>
    </head>
    <body>
        <header class="small">
            <a href="/nl/">
                <img id="logo" src="/assets/img/logo_512.png" alt="Logo: moth with spread, speckled black and red wings">
            </a>

            <h1>Library of Identification Resources</h1>

            <nav>
                <ul>
                    <li><a href="/nl/catalog">Catalogus</a></li>
                    <li><a href="/nl/catalog/visualizations">Statistieken</a></li>
                    <li><a href="/nl/users/settings">Instellingen</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <article>
                <header>
                    <h2 id="title"></h2>
                </header>

                <section>
                    <div class="table">
                        <table>
                            <tbody id="metadata">
                                <tr>
                                    <th>Deel van</th>
                                    <td id="part_of"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section>
                    <h3>Info hulpmiddel</h3>
                    <div class="table">
                        <table>
                            <tbody>
                                <tr>
                                    <th>Type hulpmiddel</th>
                                    <td id="resource_type"></td>
                                </tr>
                                <tr>
                                    <th>Geldt voor</th>
                                    <td id="scope"></td>
                                </tr>
                                <tr>
                                    <th>Voor het gebied</th>
                                    <td id="region"></td>
                                </tr>
                                <tr>
                                    <th>Aantal taxa</th>
                                    <td id="taxon_count"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </section>

                <section>
                    <h3>Taxa</h3>

                    <div id="flags">
                    </div>

                    <ul id="taxa_section"></ul>
                    <style>
                        #taxa_section { padding-left: 0; }
                        #taxa_section, #taxa_section ul { list-style-type: none; }
                        #taxa_section summary { margin-left: -17px; }
                    </style>
                </section>
            </article>
        </main>

        <script src="/assets/js/shared.js" charset="utf-8"></script>
        <script src="/assets/js/key.js" charset="utf-8"></script>
    </body>
</html>
